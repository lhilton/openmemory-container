# =============================================================================
# OpenMemory pinned-commit image builder.
#
# Builds CaviraOSS/OpenMemory's own Dockerfiles verbatim (no fork, no source
# modification) at a KNOWN-GOOD commit and publishes signed linux/amd64 images
# to GHCR.
#
# The commit to build is pinned in `.upstream-commit`. To update, edit that file
# to a new commit SHA and push to main — that triggers a build and moves :latest.
# A manual run with a `ref` input builds an arbitrary commit/branch/tag WITHOUT
# moving :latest (handy for testing).
#
# Why a pinned commit (not a release tag): upstream's tagged releases currently
# can't build both images — v1.2.3 has no dashboard Dockerfile and v1.3.0 ships
# no dashboard source. Only main builds backend + dashboard together, so we pin a
# tested main commit and bump it deliberately.
#
# Two images are published:
#   ghcr.io/lhilton/openmemory            (backend, packages/openmemory-js)
#   ghcr.io/lhilton/openmemory-dashboard  (Next.js web UI, dashboard)
#
# Actions are pinned to SHAs. Dependabot keeps them current (.github/dependabot.yml).
# =============================================================================
name: openmemory build

on:
  push:
    branches:
      - main
    paths:
      - '.upstream-commit'
      - '.github/workflows/openmemory-upstream-rebuild.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Upstream ref to build (commit SHA, branch, or tag). Empty = use .upstream-commit. A non-empty value does NOT move :latest.'
        required: false
        type: string
        default: ''

# No workflow-level permissions — all grants are job-scoped.
permissions: {}

concurrency:
  group: openmemory-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: resolve the upstream ref (pin file or dispatch input) to a commit SHA.
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      should_promote: ${{ steps.resolve.outputs.should_promote }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve ref to commit SHA
        id: resolve
        # ref input is passed via env (injection defense — never interpolate
        # ${{ inputs.ref }} directly into a bash double-quoted string).
        env:
          REF_INPUT: ${{ inputs.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Signs/verifies with the main-branch OIDC identity, so fail before any
          # build/push when dispatched elsewhere.
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::This workflow may only publish from refs/heads/main (got $GITHUB_REF)"
            exit 1
          fi

          # Dispatch input wins; otherwise use the pinned commit. A dispatch ref is
          # an ad-hoc build and must NOT move :latest.
          if [ -n "$REF_INPUT" ]; then
            REF="$REF_INPUT"
            PROMOTE=false
          else
            REF="$(tr -d ' \t\r\n' < .upstream-commit)"
            PROMOTE=true
          fi
          test -n "$REF" || { echo "::error::No ref to build (empty .upstream-commit and no input)"; exit 1; }

          # Allow only safe ref characters (SHA / branch / tag).
          if [[ ! "$REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Invalid ref '$REF'"
            exit 1
          fi

          # Resolve REF -> full commit SHA (works for a SHA, branch, or tag).
          SHA=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/CaviraOSS/OpenMemory/commits/$REF" \
            | jq -r '.sha')
          test -n "$SHA" && [ "$SHA" != "null" ] || { echo "::error::Could not resolve ref '$REF' to a commit"; exit 1; }
          SHORT="${SHA:0:7}"

          {
            echo "sha=$SHA"
            echo "short_sha=$SHORT"
            echo "should_promote=$PROMOTE"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved ref=$REF sha=$SHA should_promote=$PROMOTE"

  # ---------------------------------------------------------------------------
  # Job 2: build both images in a matrix.
  # ---------------------------------------------------------------------------
  build:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: openmemory
            context: packages/openmemory-js
            dockerfile: packages/openmemory-js/Dockerfile
            build-args: ''
          - image: openmemory-dashboard
            context: dashboard
            dockerfile: dashboard/Dockerfile
            # Empty NEXT_PUBLIC_* => client uses the same-origin runtime proxy
            # (app/api/openmemory/[...path]/route.ts reads OPENMEMORY_API_URL at
            # runtime). Keeps the prebuilt image portable — no build-time URL baking.
            build-args: |
              NEXT_PUBLIC_API_URL=
              NEXT_PUBLIC_API_KEY=
    steps:
      - name: Checkout OpenMemory source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: CaviraOSS/OpenMemory
          ref: ${{ needs.check.outputs.sha }}
          path: openmemory
          fetch-depth: 1
          persist-credentials: false

      - name: Verify SHA matches resolved value (TOCTOU defense)
        env:
          EXPECTED_SHA: ${{ needs.check.outputs.sha }}
        run: |
          cd openmemory
          ACTUAL_SHA=$(git rev-parse HEAD)
          test "$ACTUAL_SHA" = "$EXPECTED_SHA" || {
            echo "::error::SHA mismatch (expected $EXPECTED_SHA, got $ACTUAL_SHA)"
            exit 1
          }

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/lhilton/${{ matrix.image }}
          # Immutable tags only; :latest is promoted after verification below.
          tags: |
            type=raw,value=${{ needs.check.outputs.short_sha }}
            type=raw,value=openmemory-${{ needs.check.outputs.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/CaviraOSS/OpenMemory
            org.opencontainers.image.revision=${{ needs.check.outputs.sha }}
            org.opencontainers.image.vendor=lhilton
            org.opencontainers.image.licenses=Apache-2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: openmemory/${{ matrix.context }}
          file: openmemory/${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Generate SLSA provenance attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/lhilton/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        env:
          IMAGE: ghcr.io/lhilton/${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Verify signature (strict identity)
        env:
          IMAGE: ghcr.io/lhilton/${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: |
          cosign verify "$IMAGE" \
            --certificate-identity 'https://github.com/lhilton/openmemory-container/.github/workflows/openmemory-upstream-rebuild.yml@refs/heads/main' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Verify SLSA provenance attestation (strict identity)
        env:
          IMAGE: oci://ghcr.io/lhilton/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify "$IMAGE" \
            --repo lhilton/openmemory-container \
            --bundle-from-oci \
            --cert-identity 'https://github.com/lhilton/openmemory-container/.github/workflows/openmemory-upstream-rebuild.yml@refs/heads/main' \
            --cert-oidc-issuer https://token.actions.githubusercontent.com

      - name: Install crane
        if: ${{ needs.check.outputs.should_promote == 'true' }}
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7
        with:
          version: v0.21.7

      - name: Promote :latest (only for pinned builds, after verification)
        if: ${{ needs.check.outputs.should_promote == 'true' }}
        env:
          IMAGE_REPO: ghcr.io/lhilton/${{ matrix.image }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          CERTIFICATE_IDENTITY: https://github.com/lhilton/openmemory-container/.github/workflows/openmemory-upstream-rebuild.yml@refs/heads/main
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ref="${IMAGE_REPO}:latest"
          crane tag "${IMAGE_REPO}@${IMAGE_DIGEST}" latest
          promoted_digest=$(crane digest "$ref")
          if [ "$promoted_digest" != "$IMAGE_DIGEST" ]; then
            echo "::error::Promoted $ref points to $promoted_digest, expected $IMAGE_DIGEST"; exit 1
          fi
          cosign verify "$ref" \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          gh attestation verify "oci://${IMAGE_REPO}@${IMAGE_DIGEST}" \
            --repo lhilton/openmemory-container \
            --bundle-from-oci \
            --cert-identity "$CERTIFICATE_IDENTITY" \
            --cert-oidc-issuer https://token.actions.githubusercontent.com
