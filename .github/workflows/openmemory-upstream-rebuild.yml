# =============================================================================
# OpenMemory upstream release tracker + image builder.
#
# Polls CaviraOSS/OpenMemory release tags daily (cron) and on manual dispatch,
# resolves the latest non-prerelease tag -> commit SHA (TOCTOU defense), builds
# upstream's own Dockerfiles verbatim (no fork, no source modification), pushes
# amd64 images to GHCR with cosign keyless signing + SLSA provenance, and commits
# the processed tag back to .upstream-release.
#
# Two images are published:
#   ghcr.io/lhilton/openmemory            (backend, packages/openmemory-js)
#   ghcr.io/lhilton/openmemory-dashboard  (Next.js web UI, dashboard)
#
# Actions are pinned to SHAs. Dependabot keeps them current (.github/dependabot.yml).
# =============================================================================
name: openmemory upstream rebuild

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a rebuild of the current latest release'
        required: false
        type: boolean
        default: false
      tag:
        description: 'Rebuild a specific historical tag (e.g. v1.2.3 or 1.2.1). Will NOT promote :latest or update .upstream-release.'
        required: false
        type: string
        default: ''

# No workflow-level permissions — all grants are job-scoped.
permissions: {}

concurrency:
  group: openmemory-upstream-rebuild-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: resolve the latest OpenMemory release tag + commit SHA, decide if changed.
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.resolve.outputs.changed }}
      tag: ${{ steps.resolve.outputs.tag }}
      sha: ${{ steps.resolve.outputs.sha }}
      should_promote: ${{ steps.resolve.outputs.should_promote }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate input, resolve tag + SHA, compute changed
        id: resolve
        # inputs.tag is passed via env (injection defense — never interpolate
        # ${{ inputs.tag }} directly into a bash double-quoted string).
        env:
          TAG_INPUT: ${{ inputs.tag }}
          FORCE_INPUT: ${{ inputs.force }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Signs/verifies with the main-branch OIDC identity, so fail before any
          # build/push when dispatched elsewhere.
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::This workflow may only publish from refs/heads/main (got $GITHUB_REF)"
            exit 1
          fi

          # --- Validate tag input format (only if supplied). Accept v/no-v forms. ---
          if [ -n "$TAG_INPUT" ]; then
            if [[ ! "$TAG_INPUT" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid tag format (must match ^v?[0-9]+\.[0-9]+\.[0-9]+\$)"
              exit 1
            fi
          fi

          # --- Resolve the tag to build ---
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              'https://api.github.com/repos/CaviraOSS/OpenMemory/releases?per_page=100' \
              | jq -r --arg re '^v?[0-9]+\.[0-9]+\.[0-9]+$' '
                  [.[] | select(.tag_name | test($re)) | select(.prerelease == false) | select(.draft == false)]
                  | sort_by(.published_at) | reverse | .[0].tag_name')
          fi
          test -n "$TAG" && [ "$TAG" != "null" ] || { echo "::error::No tag resolved"; exit 1; }

          # --- Resolve tag -> commit SHA (dereference annotated tags; fail-closed) ---
          RESP=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/CaviraOSS/OpenMemory/git/refs/tags/$TAG")
          TYPE=$(echo "$RESP" | jq -r '.object.type')
          OBJ_SHA=$(echo "$RESP" | jq -r '.object.sha')
          if [ "$TYPE" = "tag" ]; then
            SHA=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/CaviraOSS/OpenMemory/git/tags/$OBJ_SHA" \
              | jq -r '.object.sha')
            test "$SHA" != "null" || { echo "::error::Could not dereference annotated tag $TAG"; exit 1; }
          elif [ "$TYPE" = "commit" ]; then
            SHA="$OBJ_SHA"
          else
            echo "::error::Unexpected object type '$TYPE' for tag $TAG"
            exit 1
          fi

          # --- Decide if anything changed (or force was requested) ---
          PINNED=$(cat .upstream-release 2>/dev/null || echo none)
          if [ "$FORCE_INPUT" = "true" ] || [ -n "$TAG_INPUT" ] || [ "$PINNED" != "$TAG" ]; then
            CHANGED=true
          else
            CHANGED=false
          fi
          if [ -z "$TAG_INPUT" ]; then SHOULD_PROMOTE=true; else SHOULD_PROMOTE=false; fi

          {
            echo "tag=$TAG"; echo "sha=$SHA"; echo "changed=$CHANGED"; echo "should_promote=$SHOULD_PROMOTE"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG sha=$SHA changed=$CHANGED should_promote=$SHOULD_PROMOTE"

  # ---------------------------------------------------------------------------
  # Job 2: build both images in a matrix. Only runs if something changed.
  # ---------------------------------------------------------------------------
  build:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: openmemory
            context: packages/openmemory-js
            dockerfile: packages/openmemory-js/Dockerfile
            build-args: ''
          - image: openmemory-dashboard
            context: dashboard
            dockerfile: dashboard/Dockerfile
            # Empty NEXT_PUBLIC_* => client uses the same-origin runtime proxy
            # (route.ts reads OPENMEMORY_API_URL at runtime). Keeps image portable.
            build-args: |
              NEXT_PUBLIC_API_URL=
              NEXT_PUBLIC_API_KEY=
    steps:
      - name: Checkout OpenMemory source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: CaviraOSS/OpenMemory
          ref: ${{ needs.check.outputs.sha }}
          path: openmemory
          fetch-depth: 1
          persist-credentials: false

      - name: Verify SHA matches resolved value (TOCTOU defense)
        env:
          EXPECTED_SHA: ${{ needs.check.outputs.sha }}
        run: |
          cd openmemory
          ACTUAL_SHA=$(git rev-parse HEAD)
          test "$ACTUAL_SHA" = "$EXPECTED_SHA" || {
            echo "::error::SHA mismatch — tag may have moved (expected $EXPECTED_SHA, got $ACTUAL_SHA)"
            exit 1
          }

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/lhilton/${{ matrix.image }}
          # Dual semver patterns publish BOTH 1.2.3 and v1.2.3 for every release,
          # regardless of upstream's v/no-v prefix (tag-consistency fix).
          tags: |
            type=semver,pattern={{version}},value=${{ needs.check.outputs.tag }}
            type=semver,pattern=v{{version}},value=${{ needs.check.outputs.tag }}
            type=raw,value=openmemory-${{ needs.check.outputs.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/CaviraOSS/OpenMemory
            org.opencontainers.image.revision=${{ needs.check.outputs.sha }}
            org.opencontainers.image.vendor=lhilton
            org.opencontainers.image.licenses=Apache-2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: openmemory/${{ matrix.context }}
          file: openmemory/${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ needs.check.outputs.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ needs.check.outputs.tag }}

      - name: Generate SLSA provenance attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/lhilton/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        env:
          IMAGE: ghcr.io/lhilton/${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Verify signature (strict identity)
        env:
          IMAGE: ghcr.io/lhilton/${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: |
          cosign verify "$IMAGE" \
            --certificate-identity 'https://github.com/lhilton/openmemory-container/.github/workflows/openmemory-upstream-rebuild.yml@refs/heads/main' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Verify SLSA provenance attestation (strict identity)
        env:
          IMAGE: oci://ghcr.io/lhilton/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify "$IMAGE" \
            --repo lhilton/openmemory-container \
            --bundle-from-oci \
            --cert-identity 'https://github.com/lhilton/openmemory-container/.github/workflows/openmemory-upstream-rebuild.yml@refs/heads/main' \
            --cert-oidc-issuer https://token.actions.githubusercontent.com

      - name: Install crane
        if: ${{ needs.check.outputs.should_promote == 'true' }}
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7
        with:
          version: v0.21.7

      - name: Promote mutable tags
        if: ${{ needs.check.outputs.should_promote == 'true' }}
        env:
          IMAGE_REPO: ghcr.io/lhilton/${{ matrix.image }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          UPSTREAM_TAG: ${{ needs.check.outputs.tag }}
          CERTIFICATE_IDENTITY: https://github.com/lhilton/openmemory-container/.github/workflows/openmemory-upstream-rebuild.yml@refs/heads/main
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${UPSTREAM_TAG#v}"          # strip leading v if present
          MAJOR="${VERSION%%.*}"
          MINOR_PATCH="${VERSION#*.}"
          MINOR="${MINOR_PATCH%%.*}"
          PROMOTE_TAGS=("latest" "${MAJOR}.${MINOR}" "$MAJOR")
          for tag in "${PROMOTE_TAGS[@]}"; do
            ref="${IMAGE_REPO}:${tag}"
            crane tag "${IMAGE_REPO}@${IMAGE_DIGEST}" "$tag"
            promoted_digest=$(crane digest "$ref")
            if [ "$promoted_digest" != "$IMAGE_DIGEST" ]; then
              echo "::error::Promoted $ref points to $promoted_digest, expected $IMAGE_DIGEST"; exit 1
            fi
            cosign verify "$ref" \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
          done
          gh attestation verify "oci://${IMAGE_REPO}@${IMAGE_DIGEST}" \
            --repo lhilton/openmemory-container \
            --bundle-from-oci \
            --cert-identity "$CERTIFICATE_IDENTITY" \
            --cert-oidc-issuer https://token.actions.githubusercontent.com

  # ---------------------------------------------------------------------------
  # Job 3: commit the processed tag back to .upstream-release.
  # Skipped for manual tag dispatches (preserves cron's no-op detection).
  # ---------------------------------------------------------------------------
  commit-pin:
    needs: [check, build]
    if: needs.check.outputs.changed == 'true' && needs.check.outputs.should_promote == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
      - name: Commit and push .upstream-release
        env:
          TAG: ${{ needs.check.outputs.tag }}
          SHA: ${{ needs.check.outputs.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          echo "$TAG" > .upstream-release
          git add .upstream-release
          if git diff --cached --quiet; then echo "no change to commit"; exit 0; fi
          git commit -m "chore(upstream): OpenMemory @ $TAG ($SHA)"
          git fetch origin "$BRANCH"
          git push origin HEAD:"$BRANCH"
